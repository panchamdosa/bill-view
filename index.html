<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Cash Counter</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        input[type="number"] { -moz-appearance: textfield; }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Forces Landscape orientation and dynamic clean filename when saving as PDF */
        @media print {
            @page {
                size: landscape;
                margin: 0.3in;
            }
            .no-print { display: none !important; }
            body { 
                background-color: white !important; 
                display: block !important;
            }
            .main-wrapper {
                max-width: 100% !important;
                width: 100% !important;
                padding: 0 !important;
            }
            .print-grid {
                display: grid !important;
                grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
                gap: 1rem !important;
            }
            .print-card { 
                border: none !important; 
                box-shadow: none !important; 
            }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen text-slate-800 antialiased pb-12">

    <!-- Screen-friendly flexible wrapper -->
    <div class="max-w-7xl mx-auto px-2 sm:px-4 pt-4 main-wrapper">
        <div class="bg-white rounded-2xl sm:rounded-3xl shadow-xl border border-slate-100 overflow-hidden print-card">
            
            <!-- Header -->
            <div class="bg-slate-900 p-4 sm:p-5 text-white flex flex-col sm:flex-row items-center justify-between gap-3">
                <div class="text-center sm:text-left">
                    <h1 class="text-xl sm:text-2xl font-black tracking-tight">Daily Cash Counter</h1>
                    <p class="text-[11px] sm:text-xs text-slate-400 font-medium">Petpooja & PhonePe Daily Report</p>
                </div>
                <!-- Date Section -->
                <div class="flex items-center gap-2 bg-slate-800 px-3 sm:px-4 py-1.5 sm:py-2 rounded-xl w-full sm:w-auto justify-between sm:justify-start">
                    <span class="text-xs font-bold text-slate-300 uppercase tracking-wider">Date:</span>
                    <input type="date" id="txnDate" onchange="updatePDFTitle()" class="bg-transparent border-none text-sm font-semibold text-white focus:outline-hidden cursor-pointer">
                </div>
            </div>

            <!-- Fully Responsive Grid: 1 Column on Mobile, 3 Columns on iPad/Laptop/Landscape -->
            <div class="p-4 sm:p-6 grid grid-cols-1 md:grid-cols-3 gap-6 print-grid">
                
                <!-- Column 1: Sales Inputs -->
                <div class="space-y-4">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span> 1. Sales & Payments
                    </h2>
                    
                    <div class="space-y-3">
                        <div class="relative">
                            <label class="absolute -top-2 left-3 bg-white px-1 text-[10px] font-bold text-slate-500 uppercase tracking-wider">Today Sales (Petpooja)</label>
                            <span class="absolute left-3 top-3.5 font-bold text-slate-400 text-lg">₹</span>
                            <input type="number" id="petpoojaSales" value="0" oninput="processSafeAccounting()" class="w-full pl-7 pr-4 py-3 border border-slate-200 rounded-xl font-bold text-lg text-slate-900 bg-slate-50/30 focus:bg-white focus:border-blue-500 outline-hidden transition-all">
                        </div>

                        <div class="relative">
                            <label class="absolute -top-2 left-3 bg-white px-1 text-[10px] font-bold text-purple-600 uppercase tracking-wider">UPI Payment (PhonePe)</label>
                            <span class="absolute left-3 top-3.5 font-bold text-purple-400 text-lg">₹</span>
                            <input type="number" id="phonepeUPI" value="0" oninput="processSafeAccounting()" class="w-full pl-7 pr-4 py-3 border border-purple-200 rounded-xl font-bold text-lg text-purple-900 bg-purple-50/10 focus:bg-white focus:border-purple-500 outline-hidden transition-all">
                        </div>

                        <!-- Auto Calculated Cash Sales -->
                        <div class="bg-emerald-50 border border-emerald-100 rounded-xl p-4 flex justify-between items-center shadow-xs">
                            <div>
                                <p class="text-xs font-bold text-emerald-800">Auto Cash Sales:</p>
                                <p class="text-[10px] text-emerald-600/80">(Sales - PhonePe)</p>
                            </div>
                            <span id="derivedCashSales" class="text-lg font-black text-emerald-700">₹0.00</span>
                        </div>
                    </div>
                </div>

                <!-- Column 2: Physical Cash Count -->
                <div>
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> 2. Physical Cash Count
                    </h2>

                    <div class="border border-slate-100 rounded-2xl overflow-hidden shadow-xs divide-y divide-slate-100" id="denomTable">
                        <!-- Rows render here dynamically -->
                    </div>

                    <div class="mt-3 bg-slate-900 text-white p-3 rounded-xl flex justify-between items-center shadow-md">
                        <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400">Total Cash:</span>
                        <span id="totalPhysicalCount" class="text-lg font-mono font-black text-yellow-400">₹0.00</span>
                    </div>
                </div>

                <!-- Column 3: Calculations & Balanced Diff -->
                <div class="space-y-4">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-slate-600"></span> 3. Calculation & Status
                    </h2>
                    
                    <div class="bg-slate-50 border border-slate-200/60 p-4 rounded-2xl space-y-3">
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Yesterday Cash</label>
                                <input type="number" id="yesterdayCash" value="0" oninput="processSafeAccounting()" class="w-full px-3 py-2 border border-slate-200 bg-white rounded-xl font-bold text-slate-800 outline-hidden text-sm">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Expense</label>
                                <input type="number" id="storeExpenses" value="0" oninput="processSafeAccounting()" class="w-full px-3 py-2 border border-slate-200 bg-white rounded-xl font-bold text-rose-600 outline-hidden text-sm">
                            </div>
                        </div>

                        <div class="pt-2 border-t border-slate-200 flex justify-between items-center">
                            <span class="text-[11px] font-bold text-slate-600 uppercase tracking-wider">Expected Cash:</span>
                            <span id="targetExpectedCash" class="text-sm font-extrabold text-slate-900">₹0.00</span>
                        </div>
                    </div>

                    <!-- DIFF Output Box -->
                    <div id="variancePanel" class="p-6 rounded-2xl border flex flex-col items-center text-center justify-center min-h-[110px] transition-all duration-300">
                        <span class="text-xs font-bold uppercase tracking-widest">DIFF</span>
                        <span id="varianceDisplay" class="text-3xl font-black mt-2 tracking-tight">₹0.00</span>
                    </div>
                </div>

            </div>
        </div>

        <!-- Print & WhatsApp Share Button -->
        <div class="no-print mt-5 max-w-xs mx-auto">
            <button onclick="handleNativePrintOrShare()" class="w-full bg-emerald-600 hover:bg-emerald-700 active:scale-[0.99] text-white font-bold p-3.5 rounded-2xl shadow-lg flex items-center justify-center space-x-2 transition-all cursor-pointer">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8.684 10.742a3 3 0 000 2.516m6.632-3.045a3 3 0 114.286 4.287 3 3 0 01-4.286-4.287zm-6.632 3.045a3 3 0 11-4.286-4.287 3 3 0 014.286 4.287z"></path>
                </svg>
                <span class="tracking-wide text-sm">Print or Share to WhatsApp</span>
            </button>
        </div>
    </div>

    <script>
        const notesLookup = [500, 200, 100, 50, 20, 10, 5];

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('txnDate').valueAsDate = new Date();
            initializeVaultRows();
            processSafeAccounting();
            updatePDFTitle();
        });

        function initializeVaultRows() {
            const container = document.getElementById('denomTable');
            container.innerHTML = '';
            
            notesLookup.forEach(val => {
                const wrapper = document.createElement('div');
                wrapper.className = "flex items-center justify-between bg-slate-50/50 px-3 py-1.5 hover:bg-slate-50";
                wrapper.innerHTML = `
                    <span class="w-14 text-xs font-black text-slate-600 tracking-wider">₹ ${val}</span>
                    <div class="flex items-center gap-1.5">
                        <span class="text-slate-400 text-[10px] font-bold">×</span>
                        <input type="number" id="input-${val}" value="0" min="0" onkeydown="guardInputMask(event)" oninput="processSafeAccounting()" 
                               class="w-14 text-center p-1 font-bold bg-white border border-slate-200 rounded-md text-slate-800 focus:border-blue-500 text-xs shadow-xs">
                    </div>
                    <span id="output-${val}" class="w-24 text-right font-mono font-bold text-slate-600 text-xs">₹0.00</span>
                `;
                container.appendChild(wrapper);
            });
        }

        function guardInputMask(e) {
            if (e.key === '-' || e.key === '.' || e.key === 'e' || e.key === 'E') {
                e.preventDefault();
            }
        }

        function processSafeAccounting() {
            const parseVal = (id) => parseFloat(document.getElementById(id).value) || 0;

            const salesTotal = parseVal('petpoojaSales');
            const upiTotal = parseVal('phonepeUPI');
            const baseOpening = parseVal('yesterdayCash');
            const expensePayouts = parseVal('storeExpenses');
            const cashDisplayRow = document.getElementById('derivedCashSales');

            const accurateCashSales = salesTotal - upiTotal;
            cashDisplayRow.innerText = "₹" + accurateCashSales.toLocaleString('en-IN', { minimumFractionDigits: 2 });

            let totalVaultCashMeasured = 0;
            notesLookup.forEach(denom => {
                const count = parseInt(document.getElementById(`input-${denom}`).value) || 0;
                const combinedRowValue = count * denom;
                document.getElementById(`output-${denom}`).innerText = "₹" + combinedRowValue.toLocaleString('en-IN', { minimumFractionDigits: 2 });
                totalVaultCashMeasured += combinedRowValue;
            });
            document.getElementById('totalPhysicalCount').innerText = "₹" + totalVaultCashMeasured.toLocaleString('en-IN', { minimumFractionDigits: 2 });

            const absoluteExpectedBalance = accurateCashSales + baseOpening - expensePayouts;
            document.getElementById('targetExpectedCash').innerText = "₹" + absoluteExpectedBalance.toLocaleString('en-IN', { minimumFractionDigits: 2 });

            const globalDiscrepancy = absoluteExpectedBalance - totalVaultCashMeasured;
            
            renderUXVarianceState(globalDiscrepancy);
        }

        function renderUXVarianceState(discrepancy) {
            const panel = document.getElementById('variancePanel');
            const display = document.getElementById('varianceDisplay');

            panel.className = "p-6 rounded-2xl border flex flex-col items-center text-center justify-center min-h-[110px] transition-all duration-300";

            if (discrepancy < 0) {
                display.innerText = "-" + "₹" + Math.abs(discrepancy).toLocaleString('en-IN', { minimumFractionDigits: 2 });
                panel.classList.add("bg-emerald-50", "border-emerald-200", "text-emerald-700");
            } else if (discrepancy > 0) {
                display.innerText = "+" + "₹" + discrepancy.toLocaleString('en-IN', { minimumFractionDigits: 2 });
                panel.classList.add("bg-rose-50", "border-rose-200", "text-rose-600");
            } else {
                display.innerText = "₹0.00";
                panel.classList.add("bg-slate-50", "border-slate-200", "text-slate-700");
            }
        }

        function updatePDFTitle() {
            const dateInput = document.getElementById('txnDate').value;
            if (dateInput) {
                const [year, month, day] = dateInput.split('-');
                document.title = `daily_cash_counter_${day}-${month}-${year}`;
            } else {
                document.title = "daily_cash_counter_report";
            }
        }

        function handleNativePrintOrShare() {
            updatePDFTitle();
            
            // Check if Web Share API can share data directly
            if (navigator.share) {
                navigator.share({
                    title: document.title,
                    text: 'Daily Cash Report Counter Matrix Summary.',
                    url: window.location.href
                }).then(() => console.log('Shared successfully'))
                  .catch(() => window.print()); // Fallback to print layout if sharing fails/cancelled
            } else {
                window.print();
            }
        }
    </script>
</body>
</html>
